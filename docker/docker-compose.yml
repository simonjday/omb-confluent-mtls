# docker-compose.yml — OMB multi-worker benchmark stack
#
# Launches three OMB workers and one OMB driver.
# All containers share host networking so they can reach the K3D cluster's
# NodePort-mapped Kafka brokers at localhost:9093-9095.
#
# Usage:
#   docker-compose --env-file ../.env up
#
# Prerequisites:
#   - K3D cluster running with Kafka NodePorts mapped to host
#   - certs/ directory populated by confluent/mtls/generate-certs.sh
#   - .env file in the repo root (see .gitignore)

# ---------------------------------------------------------------------------
# Shared environment variables for every service
# ---------------------------------------------------------------------------
x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9093,localhost:9094,localhost:9095,localhost:9096}
  KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
  TRUSTSTORE_PASSWORD: ${TRUSTSTORE_PASSWORD:-changeit}
  # OMB scripts read HEAP_OPTS (not JVM_MEM) to set heap size.
  # 1G is plenty for Kafka client state + Javalin; keeps RSS ~1.5G per worker.
  HEAP_OPTS: "-Xms128m -Xmx1024m"

# ---------------------------------------------------------------------------
# Shared resource limits
# ---------------------------------------------------------------------------
x-worker-resources: &worker-resources
  deploy:
    resources:
      limits:
        cpus: "2"
        memory: 4G
      reservations:
        cpus: "0.5"
        memory: 1G

networks:
  # Attach to the K3D Docker network so containers can resolve K3D node IPs.
  # The network is created automatically by K3D when the cluster is created.
  k3d-confluent-benchmark:
    external: true
    name: k3d-confluent-benchmark

services:
  # --------------------------------------------------------------------------
  # OMB Worker 1 — listens on :8080
  # --------------------------------------------------------------------------
  omb-worker-1:
    image: omb:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omb-worker-1
    hostname: omb-worker-1
    network_mode: host
    environment:
      <<: *common-env
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/metrics | grep -q jvm || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: "no"
    <<: *worker-resources

  # --------------------------------------------------------------------------
  # OMB Worker 2 — listens on :8082 (stats on :8083)
  # --------------------------------------------------------------------------
  omb-worker-2:
    image: omb:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omb-worker-2
    hostname: omb-worker-2
    network_mode: host
    environment:
      <<: *common-env
    volumes:
      - ../certs:/certs:ro
    command: ["bin/benchmark-worker", "--port", "8082", "--stats-port", "8083"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/metrics | grep -q jvm || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: "no"
    <<: *worker-resources

  # --------------------------------------------------------------------------
  # OMB Worker 3 — listens on :8084 (stats on :9082)
  # --------------------------------------------------------------------------
  omb-worker-3:
    image: omb:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omb-worker-3
    hostname: omb-worker-3
    network_mode: host
    environment:
      <<: *common-env
    volumes:
      - ../certs:/certs:ro
    command: ["bin/benchmark-worker", "--port", "8084", "--stats-port", "8085"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/metrics | grep -q jvm || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: "no"
    <<: *worker-resources

  # --------------------------------------------------------------------------
  # OMB Driver — waits for all workers, then runs the benchmark
  # --------------------------------------------------------------------------
  omb-driver:
    image: omb:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omb-driver
    hostname: omb-driver
    network_mode: host
    environment:
      <<: *common-env
      WORKLOAD: ${WORKLOAD:-simple-workload}
      # Driver accumulates histograms so needs more heap than workers
      HEAP_OPTS: "-Xms256m -Xmx2500m"
    volumes:
      - ../certs:/certs:ro
      - ../omb:/workloads:ro
      - ../results:/results
    entrypoint: ["bin/benchmark"]
    # Override command at runtime via scripts/run-benchmark.sh
    # e.g.: bin/benchmark --drivers /workloads/driver-kafka.yaml
    #                      --workers /workloads/workers.yaml
    #                      /workloads/workloads/${WORKLOAD}.yaml
    command: ["--help"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bin/benchmark$' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      omb-worker-1:
        condition: service_healthy
      omb-worker-2:
        condition: service_healthy
      omb-worker-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
