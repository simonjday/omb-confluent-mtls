# k3d-cluster-config.yaml
# K3D cluster configuration for the Confluent Benchmark platform.
#
# Creates a cluster named "confluent-benchmark" with:
#   - 1 control-plane server
#   - 3 worker agent nodes
#   - NodePort mappings for Kafka external listeners (9093-9095)
#   - K8s API accessible on host port 6443
#   - Traefik ingress controller disabled (not needed)
#
# Usage:
#   k3d cluster create --config k3d/k3d-cluster-config.yaml

apiVersion: k3d.io/v1alpha5
kind: Simple

metadata:
  name: confluent-benchmark

# ---------------------------------------------------------------------------
# Node topology
# ---------------------------------------------------------------------------
servers: 1   # Control-plane / etcd node
agents: 3    # Worker nodes (one per Kafka broker)

# ---------------------------------------------------------------------------
# Container image for all K3D nodes
# ---------------------------------------------------------------------------
image: rancher/k3s:v1.29.4-k3s1

# ---------------------------------------------------------------------------
# Port mappings from host → K3D load-balancer → NodePort services
#
# Format: hostPort:containerPort — K3D nginx proxies containerPort to K3D
# agent nodes on the SAME port number. The Kafka NodePort values must
# therefore match these container ports (9093-9096), which requires
# extending K3S's NodePort range (see extraArgs below).
#
# Port layout:
#   9093 → kafka-bootstrap-np  NodePort 9093 (bootstrap endpoint)
#   9094 → kafka-0-np          NodePort 9094 (kafka-0 external)
#   9095 → kafka-1-np          NodePort 9095 (kafka-1 external)
#   9096 → kafka-2-np          NodePort 9096 (kafka-2 external)
# ---------------------------------------------------------------------------
ports:
  - port: 9093:9093
    nodeFilters:
      - loadbalancer
  - port: 9094:9094
    nodeFilters:
      - loadbalancer
  - port: 9095:9095
    nodeFilters:
      - loadbalancer
  - port: 9096:9096
    nodeFilters:
      - loadbalancer

# ---------------------------------------------------------------------------
# K3D options
# ---------------------------------------------------------------------------
options:
  k3d:
    wait: true          # Wait for all nodes to be ready before returning
    timeout: "300s"     # Maximum time to wait for cluster creation
    disableLoadbalancer: false
    disableImageVolume: false
  k3s:
    extraArgs:
      # Disable Traefik ingress controller — not needed for this benchmark
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
      # Extend NodePort range to allow ports 9093-9096 for Kafka external
      # listeners. K3D nginx proxies to agent nodes on the same port number
      # as the containerPort, so Kafka's NodePort values must match the LB
      # port mappings above. Default K3S range (30000-32767) is too high.
      - arg: "--kube-apiserver-arg=--service-node-port-range=9000-32767"
        nodeFilters:
          - server:*
  runtime:
    gpuRequest: ""
    serversMemory: ""
    agentsMemory: ""

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
network: k3d-confluent-benchmark  # Docker network name (shared with OMB containers)

# ---------------------------------------------------------------------------
# Registries (none required — images pulled from Docker Hub)
# ---------------------------------------------------------------------------
registries:
  use: []
